<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Relief Reminder">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-startup-image" href="icon-512.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="icon-512.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="icon-512.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="icon-512.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary-dark: #0F172A; --primary-navy: #1E293B;
            --accent-gold: #C9A961; --accent-gold-light: #E5C989; --accent-gold-dark: #A88B4A;
            --text-primary: #0F172A; --text-secondary: #64748B; --text-muted: #94A3B8;
            --bg-cream: #FAF7F2; --glass-bg: rgba(255,255,255,0.7); --glass-border: rgba(255,255,255,0.3);
            --shadow-md: 0 8px 24px rgba(15,23,42,0.08); --shadow-lg: 0 20px 60px rgba(15,23,42,0.12);
            --shadow-gold: 0 8px 24px rgba(201,169,97,0.25);
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-cream);
            min-height: 100vh; color: var(--text-primary); -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 20% 10%, rgba(201,169,97,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(30,41,59,0.06) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .container { max-width: 640px; margin: 0 auto; padding: 24px 24px 48px; position: relative; z-index: 1; }
        .header { text-align: center; padding: 12px 0 24px; position: relative; }
        .header::after {
            content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 48px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }
        .brand-mark {
            display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-navy)); border-radius: 12px;
            margin-bottom: 10px; box-shadow: var(--shadow-md), 0 0 0 1px rgba(201,169,97,0.2); position: relative;
        }
        .brand-mark::before {
            content: ''; position: absolute; inset: 2px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dark)); opacity: 0.9;
        }
        .brand-mark svg { position: relative; z-index: 1; width: 20px; height: 20px; color: var(--primary-dark); }
        .header h1 {
            font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 28px;
            font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; line-height: 1.1;
        }
        .header .developer-credit {
            color: var(--text-muted); font-size: 10px; font-weight: 400; letter-spacing: 0.5px; margin-bottom: 12px; opacity: 0.6;
        }
        .header .developer-credit a { color: var(--accent-gold-dark); text-decoration: none; font-weight: 500; }
        .install-btn {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-navy));
            color: var(--accent-gold-light); margin-top: 8px; display: none; padding: 12px 28px; border: none;
            border-radius: 100px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.3s ease;
        }
        .card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; margin-bottom: 24px; border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md); overflow: hidden; position: relative;
        }
        #todayCard .today-row { padding: 12px 28px; display: flex; align-items: center; gap: 12px; }
        .today-label { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--primary-dark); }
        .today-info { margin-left: auto; display: flex; align-items: baseline; gap: 10px; text-align: right; }
        .today-date { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--primary-dark); }
        .today-time { font-size: 15px; font-weight: 600; color: var(--accent-gold); font-variant-numeric: tabular-nums; }
        .today-day { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
        .card-header { padding: 24px 28px 16px; display: flex; align-items: center; gap: 12px; }
        .card-header-icon {
            width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dark));
            border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white;
            font-size: 14px; font-weight: 600; box-shadow: var(--shadow-gold);
        }
        .card-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--primary-dark); }
        .card-subtitle { font-size: 12px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
        .form-group { padding: 0 28px; margin-bottom: 4px; }
        .form-group + .form-group { border-top: 1px solid rgba(15,23,42,0.06); }
        label {
            display: block; padding: 16px 0 6px; color: var(--text-secondary); font-size: 11px;
            font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
        }
        input, select {
            width: 100%; padding: 8px 0 16px; border: none; font-size: 16px; font-family: inherit;
            font-weight: 500; color: var(--text-primary); background: transparent;
            -webkit-appearance: none; appearance: none;
        }
        input::placeholder { color: var(--text-muted); font-weight: 400; }
        input:focus, select:focus { outline: none; }
        
        /* CSS KHAS UNTUK SLOT MASA (1 BARIS SAHAJA) */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3e%3cpath fill='%23C9A961' d='M5 6L0 0h10z'/%3e%3c/svg%3E");
            background-repeat: no-repeat; background-position: right center; padding-right: 24px; cursor: pointer;
        }
        #timeSlot {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            padding-bottom: 14px;
        }

        .primary-btn {
            width: calc(100% - 56px); margin: 24px 28px 28px; padding: 18px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-navy));
            color: var(--accent-gold-light); border: none; border-radius: 14px; font-size: 14px;
            font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
            transition: all 0.3s ease; box-shadow: var(--shadow-md);
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg), var(--shadow-gold); }
        
        .notification-toggle { display: flex; align-items: center; justify-content: space-between; padding: 20px 28px; }
        .toggle-info { display: flex; align-items: center; gap: 14px; }
        .toggle-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, rgba(201,169,97,0.15), rgba(201,169,97,0.05));
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .toggle-text h4 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
        .toggle-text p { font-size: 12px; color: var(--text-muted); }
        .toggle-switch { position: relative; width: 52px; height: 32px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0; background: #E2E8F0;
            transition: .3s cubic-bezier(0.4,0,0.2,1); border-radius: 32px;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s cubic-bezier(0.4,0,0.2,1); border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        input:checked + .slider { background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dark)); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .schedule-list { padding: 8px 0; }
        .schedule-item {
            padding: 18px 28px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(15,23,42,0.06); position: relative;
        }
        .schedule-item:last-child { border-bottom: none; }
        .schedule-info { flex: 1; }
        .schedule-info h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .schedule-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .schedule-meta span { color: var(--text-secondary); font-size: 12px; font-weight: 500; }
        .date-badge { color: var(--accent-gold-dark); font-weight: 600; background: rgba(201,169,97,0.1); padding: 3px 8px; border-radius: 6px; }
        .slot-badge { color: var(--primary-navy); font-weight: 600; background: rgba(30,41,59,0.08); padding: 3px 8px; border-radius: 6px; }
        .delete-btn {
            background: transparent; color: var(--text-muted); border: 1px solid rgba(15,23,42,0.1);
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .delete-btn:hover { color: #DC2626; border-color: #DC2626; }
        
        .empty-state { text-align: center; padding: 50px 28px; }
        .empty-icon { font-size: 28px; margin-bottom: 10px; }
        .empty-state h4 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 6px; }
        .empty-state p { font-size: 13px; color: var(--text-muted); }
        
        .footer { text-align: center; padding: 30px 0 10px; color: var(--text-muted); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
        .footer::before { content: '◆'; display: block; color: var(--accent-gold); margin-bottom: 12px; letter-spacing: 8px; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeInUp 0.6s ease backwards; }
        .card:nth-child(2) { animation-delay: 0.1s; } .card:nth-child(3) { animation-delay: 0.2s; } .card:nth-child(4) { animation-delay: 0.3s; }
        
        @media (max-width: 600px) {
            .container { padding: 24px 16px 40px; }
            .header h1 { font-size: 34px; }
            .card-header, .form-group, .notification-toggle, .schedule-item { padding-left: 20px; padding-right: 20px; }
            .primary-btn { width: calc(100% - 40px); margin: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <h1>Relief Reminder</h1>
            <p class="developer-credit">developed by <a href="#">@ustazashraf</a></p>
            <button id="installBtn" class="install-btn" onclick="installApp()" style="display:none;">⬇ Install Aplikasi</button>
        </div>
        
        <div class="card">
            <div class="notification-toggle">
                <div class="toggle-info">
                    <div class="toggle-icon">🔔</div>
                    <div class="toggle-text">
                        <h4>Notifikasi Aktif</h4>
                        <p>Ingatan automatik sebelum kelas</p>
                    </div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="notificationToggle" onchange="toggleNotification()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
            <div class="card" id="todayCard">
            <div class="today-row">
                <div class="card-header-icon">📅</div>
                <div class="today-label">Hari Ini</div>
                <div class="today-info">
                    <span id="todayDate" class="today-date">-</span>
                    <span id="todayTime" class="today-time">-</span>
                    <span id="todayDay" class="today-day">-</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <div class="card-header-icon">+</div>
                <div>
                    <div class="card-title">Tambah Kelas</div>
                    <div class="card-subtitle">Jadual Penggantian</div>
                </div>
            </div>
            <form id="scheduleForm">
                <div class="form-group">
                    <label for="grade">Tingkatan</label>
                    <select id="grade" required>
                        <option value="">Pilih Tingkatan</option>
                        <option value="1">Tingkatan 1</option>
                        <option value="2">Tingkatan 2</option>
                        <option value="3">Tingkatan 3</option>
                        <option value="4">Tingkatan 4</option>
                        <option value="5">Tingkatan 5</option>
                    </select>
                </div>
<div class="form-group">
                    <label for="className">Nama Kelas</label>
                    <select id="className" required>
                        <option value="">Pilih Nama Kelas</option>
                        <option value="Amanah">Amanah</option>
                        <option value="Bakti">Bakti</option>
                        <option value="Cekal">Cekal</option>
                        <option value="Damai">Damai</option>
                        <option value="Gigih">Gigih</option>
                        <option value="Hormat">Hormat</option>
                        <option value="Ikhlas">Ikhlas</option>
                        <option value="Jujur">Jujur</option>
                        <option value="PVMA">PVMA</option>
                        <option value="AF">AF</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="timeSlot">Slot Masa</label>
                    <!-- Teks sangat kompak untuk pastikan 1 baris -->
                    <select id="timeSlot" required>
                        <option value="">Pilih Slot Masa</option>
                        <option value="1|7.30-8.00|07:30">1: 7.30-8.00</option>
                        <option value="2|8.00-8.30|08:00">2: 8.00-8.30</option>
                        <option value="3|8.30-9.00|08:30">3: 8.30-9.00</option>
                        <option value="4|9.00-9.30|09:00">4: 9.00-9.30</option>
                        <option value="5|9.30-10.00|09:30">5: 9.30-10.00</option>
                        <option value="6|10.00-10.30|10:00">6: 10.00-10.30</option>
                        <option value="7|10.30-11.20|10:30">7: 10.30-11.20</option>
                        <option value="8|11.20-11.50|11:20">8: 11.20-11.50</option>
                        <option value="9|11.50-12.20|11:50">9: 11.50-12.20</option>
                        <option value="10|12.20-12.50|12:20">10: 12.20-12.50</option>
                        <option value="11|12.50-1.20|12:50">11: 12.50-1.20</option>
                        <option value="12|1.20-1.50|13:20">12: 1.20-1.50</option>
                        <option value="13|1.50-2.20|13:50">13: 1.50-2.20</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reminder">Ingatan</label>
                    <select id="reminder">
                        <option value="5" selected>5 minit sebelum</option>
                        <option value="10">10 minit sebelum</option>
                        <option value="15">15 minit sebelum</option>
                        <option value="30">30 minit sebelum</option>
                        <option value="60">1 jam sebelum</option>
                    </select>
                </div>
                <button type="submit" class="primary-btn">Simpan Jadual</button>
            </form>
        </div>
        
        <div class="card">
            <div class="card-header">
                <div class="card-header-icon">📋</div>
                <div>
                    <div class="card-title">Jadual Aktif</div>
                    <div class="card-subtitle">Senarai Kelas Ganti</div>
                </div>
            </div>
            <div id="scheduleList" class="schedule-list">
                <div class="empty-state">
                    <div class="empty-icon">📚</div>
                    <h4>Tiada Jadual</h4>
                    <p>Tambah kelas ganti untuk mula</p>
                </div>
            </div>
        </div>
        <div class="footer">Relief Reminder · Premium Edition</div>
    </div>

    <script>
        let deferredPrompt;
        let schedules = JSON.parse(localStorage.getItem('schedules')) || [];
        let notificationEnabled = false;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('✅ SW registered'))
                .catch(err => console.log('❌ SW failed:', err));
            navigator.serviceWorker.ready.then(() => {
                syncNotificationToggle();
                rescheduleAllNotifications();
            });
            let swReloaded = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (swReloaded) return;
                swReloaded = true;
                location.reload();
            });
        } else {
            syncNotificationToggle();
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.querySelector('.install-btn');
            if (installBtn) installBtn.style.display = 'inline-flex';
        });

        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA installed');
            const installBtn = document.querySelector('.install-btn');
            if (installBtn) installBtn.style.display = 'none';
            deferredPrompt = null;
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') console.log('✅ User accepted install');
                    deferredPrompt = null;
                    const installBtn = document.querySelector('.install-btn');
                    if (installBtn) installBtn.style.display = 'none';
                });
            }
        }

        function syncNotificationToggle() {
            const toggle = document.getElementById('notificationToggle');
            if (!('Notification' in window)) { toggle.checked = false; toggle.disabled = true; return; }
            if (Notification.permission === 'granted') {
                toggle.checked = true;
                notificationEnabled = true;
            } else {
                toggle.checked = false;
                notificationEnabled = false;
            }
        }

        function toggleNotification() {
            const toggle = document.getElementById('notificationToggle');
            if (toggle.checked) {
                if (!('Notification' in window)) { toggle.checked = false; return; }
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        notificationEnabled = true;
                        rescheduleAllNotifications();
                        navigator.serviceWorker.ready.then(reg =>
                            reg.showNotification('Relief Reminder Aktif', {
                                body: 'Notifikasi kelas ganti diaktifkan', icon: 'icon-192.png'
                            })
                        );
                    } else {
                        toggle.checked = false;
                        notificationEnabled = false;
                        alert('Sila benarkan notifikasi untuk menerima ingatan.');
                    }
                });
            } else {
                notificationEnabled = false;
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                    schedules.forEach(s => navigator.serviceWorker.controller.postMessage({ type: 'CANCEL_NOTIFICATION', id: s.id }));
                }
            }
        }

        function updateDateTime() {
            const now = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('todayDate').textContent = now.toLocaleDateString('ms-MY', options);
            document.getElementById('todayTime').textContent = now.toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            document.getElementById('todayDay').textContent = now.toLocaleDateString('ms-MY', { weekday: 'long' });
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();

        document.getElementById('scheduleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const grade = document.getElementById('grade').value;
            const className = document.getElementById('className').value;
            const slotData = document.getElementById('timeSlot').value.split('|');
            
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            
            const schedule = {
                id: Date.now(), className: `${grade} ${className}`, date: dateStr,
                slotNumber: slotData[0], slotDisplay: slotData[1], startTime24: slotData[2],
                reminder: document.getElementById('reminder').value, notified: false
            };
            
            schedules.push(schedule);
            schedules.sort((a, b) => new Date(a.date + ' ' + a.startTime24) - new Date(b.date + ' ' + b.startTime24));
            localStorage.setItem('schedules', JSON.stringify(schedules));
            scheduleNotification(schedule);
            this.reset(); updateDateTime(); renderSchedules();
            if (navigator.vibrate) navigator.vibrate(10);
            
            const btn = this.querySelector('.primary-btn');
            const orig = btn.textContent;
            btn.textContent = '✓ Disimpan';
            setTimeout(() => { btn.textContent = orig; }, 2000);
        });

        function renderSchedules() {
            const list = document.getElementById('scheduleList');
            if (!schedules.length) {
                list.innerHTML = `<div class="empty-state">
                    <div class="empty-icon">📚</div>
                    <h4>Tiada Jadual</h4>
                    <p>Tambah kelas ganti untuk mula</p>
                </div>`;
                return;
            }
            list.innerHTML = schedules.map(s => `
                <div class="schedule-item" data-id="${s.id}">
                    <div class="schedule-info">
                        <h3>${s.className}</h3>
                        <div class="schedule-meta">
                            <span class="date-badge">${formatDate(s.date)}</span>
                            <span class="slot-badge">${s.slotDisplay}</span>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteSchedule(${s.id})">Padam</button>
                </div>
            `).join('');
        }

        function deleteSchedule(id) {
            schedules = schedules.filter(s => s.id !== id);
            localStorage.setItem('schedules', JSON.stringify(schedules));
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'CANCEL_NOTIFICATION', id: id });
            }
            renderSchedules();
        }

        function formatDate(d) {
            const parts = d.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        function scheduleNotification(schedule) {
            const reminderMin = parseInt(schedule.reminder) || 5;
            const slotTime = new Date(schedule.date + ' ' + schedule.startTime24);
            const reminderTime = slotTime.getTime() - reminderMin * 60000;
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'SCHEDULE_NOTIFICATION',
                    schedule: schedule,
                    reminderTime: reminderTime,
                    id: schedule.id
                });
            }
        }

        function rescheduleAllNotifications() {
            schedules.forEach(s => scheduleNotification(s));
        }

        renderSchedules();
    </script>
</body>
